<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength</title>
</head>

<body>
    <style>
        body{
            display: flex;
            justify-content: center;
            margin-top: 30px;
        }
        div {
            display: flex;
            top: 30px;
            left: 600px;
            background-color: pink;
            padding: 50px;
            padding-top: 20px;
            height: 200px;
        }

        div button {
            margin-top: 10px;
        }

        #strength-check {
            color: red;
            min-width: 120px;
            min-height: 20px;
        }

        #container {
            width: 300px;
            justify-content: center;
            text-align: center;
            display: inline-block;
        }
    </style>
    <div id="container">
        <center>

            <form id="forminput">
                <table>
                    <h3>PASSWORD STRENGTH</h3>
                    <tr>
                        <td>Name:</td>
                        <td><input type="text" placeholder="Enter Name"></td>
                    </tr>
                    <br>
                    <tr>
                        <td>Password:</td>
                        <td><input type="password" placeholder="Enter Password" id="pass-input" onkeyup="check()"></td>
                    </tr>
                    <tr>
                        <td>
                            <h3 id="strength-check">Strength?</h3>
                        </td>
                    </tr>
            </form>
            </table>
        </center>

    </div>

    <script>
        var passinput = document.getElementById("pass-input");
        var strengthcheck = document.getElementById("strength-check");
        function check() {
            if(passinput.value.length===0){
                strengthcheck.innerHTML = " ";
                strength-check.append(strengthcheck);
            }
            if (passinput.value.length < 6) {
                strengthcheck.innerHTML = "Weak...";
                strength-check.append(strengthcheck);
            }
            else if (passinput.value.length < 10) {
                strengthcheck.innerHTML = "Medium....";
                strength-check.append(strengthcheck);
            }
           
            else {
                strengthcheck.innerHTML = "Strong...";
                strength-check.append(strengthcheck);
            }
        }
    </script>
</body>

</html>
